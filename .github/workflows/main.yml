name: Build firmware

on:
  push:
    branches:
      - main
      - develop

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        board:
          - esp32-s3
          - esp32-s3-mini

    steps:
      - uses: actions/checkout@v3

      - uses: actions/cache@v3
        with:
          path: |
            ~/.cache/pip
            ~/.platformio/.cache
          key: ${{ runner.os }}-pio
      - uses: actions/setup-node@v4.1.0

      - uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Build webUI
        run: cd miniweb && npm i && npm run build;

      - name: Install PlatformIO Core
        run: pip install --upgrade platformio

      - name: Build PlatformIO Project
        run: |
          pio run -e ${{ matrix.board }} 
          pio run -e ${{ matrix.board }} -t buildfs

      - name: Save firmware file
        uses: actions/upload-artifact@v4
        with:
          name: firmware-${{ matrix.board }}
          path: |
            .pio/build/${{ matrix.board }}/firmware.bin
            .pio/build/${{ matrix.board }}/spiffs.bin

  publish:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: /tmp/firmware

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: firmware-${{ github.sha }}
          name: Firmware build for ${{ github.sha }}
          body: |
            Automated firmware build for commit ${{ github.sha }} on branch ${{ github.ref_name }}.
            Generated by the Build firmware workflow run ${{ github.run_id }}.
          draft: false
          prerelease: ${{ github.ref != 'refs/heads/main' }}
          files: |
            /tmp/firmware/*/*.bin
          fail_on_unmatched_files: true

      - name: Switch to artifacts branch
        shell: bash
        run: |
          git fetch origin artifacts || true
          if git show-ref --verify --quiet refs/remotes/origin/artifacts; then
            git checkout artifacts
          else
            git checkout --orphan artifacts
            rm -rf *
          fi

      - name: Update published firmware
        shell: bash
        run: |
          rm -rf firmware
          mkdir -p firmware
          shopt -s nullglob
          for board_dir in /tmp/firmware/*; do
            board_name="${board_dir##*/}"
            board_name="${board_name#firmware-}"
            mkdir -p "firmware/${board_name}"
            cp "${board_dir}/"*.bin "firmware/${board_name}/"
          done

      - name: Commit and push
        shell: bash
        run: |
          if git status --porcelain | grep .; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add -A firmware
            git commit -m "Publish firmware for ${GITHUB_SHA}"
            git push origin HEAD:artifacts
          else
            echo "No updates to publish"
          fi
