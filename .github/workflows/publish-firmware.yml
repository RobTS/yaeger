name: Publish firmware artifacts

on:
  workflow_run:
    workflows:
      - Build firmware
    types:
      - completed

jobs:
  publish:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      BUILD_RUN_ID: ${{ github.event.workflow_run.id }}
      BUILD_HEAD_SHA: ${{ github.event.workflow_run.head_sha }}
      BUILD_HEAD_BRANCH: ${{ github.event.workflow_run.head_branch }}
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          run-id: ${{ env.BUILD_RUN_ID }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          path: /tmp/firmware

      - name: Prepare bins directory
        run: |
          set -euo pipefail
          mkdir -p /tmp/bins
          shopt -s nullglob
          for board_dir in /tmp/firmware/*; do
            board_name="${board_dir##*/}"
            board_name="${board_name#firmware-}"
            for file in "${board_dir}"/*.bin; do
              base_name="${file##*/}"
              cp "${file}" "/tmp/bins/${board_name}-${base_name}"
            done
          done
          if [ -z "$(ls -A /tmp/bins)" ]; then
            echo "No firmware files collected" >&2
            exit 1
          fi

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: firmware-${{ env.BUILD_HEAD_SHA }}
          name: Firmware build for ${{ env.BUILD_HEAD_SHA }}
          body: |
            Automated firmware build for commit ${{ env.BUILD_HEAD_SHA }} on branch ${{ env.BUILD_HEAD_BRANCH }}.
            Generated by the Build firmware workflow run ${{ env.BUILD_RUN_ID }}.
          draft: false
          prerelease: ${{ env.BUILD_HEAD_BRANCH != 'main' }}
      - name: Upload firmware assets to release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: firmware-${{ env.BUILD_HEAD_SHA }}
        run: |
          set -euo pipefail
          shopt -s nullglob
          for file in /tmp/bins/*; do
            base_name="${file##*/}"
            gh release upload "${RELEASE_TAG}" "$file" --repo "$GITHUB_REPOSITORY" --clobber --name "bins/${base_name}"
          done

      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Update published firmware branch
        shell: bash
        run: |
          git fetch origin artifacts || true
          if git show-ref --verify --quiet refs/remotes/origin/artifacts; then
            git checkout artifacts
          else
            git checkout --orphan artifacts
            rm -rf *
          fi

          rm -rf firmware
          mkdir -p firmware
          shopt -s nullglob
          for board_dir in /tmp/firmware/*; do
            board_name="${board_dir##*/}"
            board_name="${board_name#firmware-}"
            mkdir -p "firmware/${board_name}"
            cp "${board_dir}/"*.bin "firmware/${board_name}/"
          done

          if [[ -n $(git status --porcelain) ]]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add -A firmware
            git commit -m "Publish firmware for ${BUILD_HEAD_SHA}"
            git push origin HEAD:artifacts
          else
            echo "No updates to publish"
          fi
